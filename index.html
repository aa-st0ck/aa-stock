<!DOCTYPE html>
<html lang="ms" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA STOCK - Pengurusan Inventori Lebih Mudah, Cepat & Sistematik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-area { width: 100% !important; position: absolute; left: 0; top: 0; margin: 0; padding: 1.5cm !important; }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f4f8', 100: '#dbe3f0', 200: '#bccbe2', 300: '#90abce', 400: '#5e85b5', 500: '#3e6398', 600: '#2f4d7b', 700: '#273e63', 800: '#1b2a47', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full text-slate-800 antialiased flex flex-col">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div id="confirm-modal" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden transform scale-95 transition-all duration-300">
            <div class="p-6">
                <div class="w-12 h-12 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center mb-4">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <h3 id="confirm-title" class="text-lg font-bold text-slate-900">Pengesahan</h3>
                <p id="confirm-desc" class="text-sm text-slate-500 mt-2">Adakah anda pasti untuk meneruskan tindakan ini?</p>
            </div>
            <div class="bg-slate-50 px-6 py-4 flex justify-end gap-3">
                <button id="confirm-btn-cancel" class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 transition font-medium text-sm">Batal</button>
                <button id="confirm-btn-confirm" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition font-medium text-sm">Ya, Teruskan</button>
            </div>
        </div>
    </div>

    <div id="app-root" class="flex flex-col md:flex-row h-full w-full overflow-hidden items-center justify-center">
        <div class="text-slate-500 font-medium flex items-center gap-2">
            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-blue-600"></div>
            Menghubungkan ke Database Cloud AA STOCK...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Terverifikasi Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDpQE3wu3v0EWyrcosBhZwR8rArNSNrikw",
            authDomain: "aa-stock.firebaseapp.com",
            projectId: "aa-stock",
            storageBucket: "aa-stock.firebasestorage.app",
            messagingSenderId: "143973644444",
            appId: "1:143973644444:web:13fe67ef88896a1fd2d559",
            measurementId: "G-K9KZRR8RNG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "inventori", "data_pusat");

        let state = {
            users: [], products: [], categories: [], suppliers: [], stockIn: [], stockOut: [], currentUser: null, activeView: 'dashboard'
        };

        let myChart = null;

        // Mendengarkan perubahan database online secara Real-Time
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const remoteData = docSnap.data();
                state.users = remoteData.users || [];
                state.products = remoteData.products || [];
                state.categories = remoteData.categories || [];
                state.suppliers = remoteData.suppliers || [];
                state.stockIn = remoteData.stockIn || [];
                state.stockOut = remoteData.stockOut || [];
            }
            renderApp();
        }, (error) => {
            console.error("Firebase Error:", error);
            alert("Ralat sambungan database. Pastikan Cloud Firestore Rules sudah diubah ke Test Mode.");
        });

        async function saveToCloud() {
            try {
                await setDoc(docRef, {
                    users: state.users,
                    products: state.products,
                    categories: state.categories,
                    suppliers: state.suppliers,
                    stockIn: state.stockIn,
                    stockOut: state.stockOut
                }, { merge: true });
            } catch (e) {
                showToast('Ralat Cloud', 'Gagal menyimpan perubahan ke server database.', 'error');
            }
        }

        // Ekspos fungsi ke scope window agar bisa diakses elemen HTML onclick
        window.navigate = (view) => { state.activeView = view; renderApp(); };
        window.logout = () => { askConfirmation('Log Keluar?', 'Anda akan ditamatkan sesi semasa.', () => { state.currentUser = null; renderApp(); }); };
        
        window.showToast = function(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg border flex gap-3 transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto bg-white`;
            let iconColor = 'text-emerald-500', iconName = 'check-circle', borderColor = 'border-emerald-100';
            if (type === 'error') { iconColor = 'text-rose-500'; iconName = 'x-circle'; borderColor = 'border-rose-100'; }
            toast.classList.add(borderColor);
            toast.innerHTML = `<div class="${iconColor} shrink-0"><i data-lucide="${iconName}" class="w-6 h-6"></i></div><div><h4 class="font-semibold text-slate-900 text-sm">${title}</h4><p class="text-slate-500 text-xs mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 50);
            setTimeout(() => { toast.classList.add('opacity-0', 'scale-95'); setTimeout(() => { toast.remove(); }, 300); }, 4000);
        };

        window.askConfirmation = function(title, description, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-desc').textContent = description;
            modal.classList.remove('hidden');
            document.getElementById('confirm-btn-cancel').onclick = () => modal.classList.add('hidden');
            document.getElementById('confirm-btn-confirm').onclick = () => { modal.classList.add('hidden'); onConfirm(); };
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const match = state.users.find(usr => usr.username === u && usr.password === p);
            if(match) { state.currentUser = match; navigate('dashboard'); } else { showToast('Ralat Masuk', 'Username atau Password tidak sah.', 'error'); }
        };

        window.handleWizardSubmit = async (e) => {
            e.preventDefault();
            state.users.push({ id: 'u_' + Date.now(), name: document.getElementById('setup-name').value, username: document.getElementById('setup-username').value, password: document.getElementById('setup-password').value, role: 'Admin' });
            await saveToCloud();
            showToast('Berjaya!', 'Akaun Admin Utama Berjaya Diwujudkan.');
            renderApp();
        };

        // Fungsi Tambah Katalog & Transaksi Online
        window.saveProduct = async (e) => {
            e.preventDefault();
            const id = document.getElementById('prod-form-id').value || 'p_' + Date.now();
            const newProd = {
                id,
                sku: document.getElementById('prod-sku').value,
                name: document.getElementById('prod-name').value,
                category: document.getElementById('prod-category').value,
                supplier: document.getElementById('prod-supplier').value,
                minStock: Number(document.getElementById('prod-min-stock').value || 0),
                unit: document.getElementById('prod-unit').value,
                currentStock: Number(document.getElementById('prod-current-stock').value || 0)
            };
            const idx = state.products.findIndex(p => p.id === id);
            if(idx > -1) { state.products[idx] = newProd; } else { state.products.push(newProd); }
            await saveToCloud();
            showToast('Berjaya!', 'Data produk dikemaskini.');
            navigate('products');
        };

        window.saveCategory = async (e) => {
            e.preventDefault();
            state.categories.push({ id: 'c_' + Date.now(), name: document.getElementById('cat-name').value });
            await saveToCloud();
            document.getElementById('cat-name').value = '';
            showToast('Berjaya', 'Kategori ditambah.');
            renderApp();
        };

        window.saveSupplier = async (e) => {
            e.preventDefault();
            state.suppliers.push({ id: 's_' + Date.now(), name: document.getElementById('sup-name').value, contact: document.getElementById('sup-contact').value });
            await saveToCloud();
            document.getElementById('sup-name').value = '';
            document.getElementById('sup-contact').value = '';
            showToast('Berjaya', 'Pembekal direkod.');
            renderApp();
        };

        window.handleStockIn = async (e) => {
            e.preventDefault();
            const pid = document.getElementById('tx-prod').value;
            const qty = Number(document.getElementById('tx-qty').value);
            const prod = state.products.find(p => p.id === pid);
            if(prod) {
                prod.currentStock += qty;
                state.stockIn.push({ id: 'in_' + Date.now(), product: prod.name, qty, date: new Date().toLocaleDateString('ms-MY') });
                await saveToCloud();
                showToast('Stok Masuk', 'Kuantiti stok berjaya ditambah.');
                navigate('dashboard');
            }
        };

        window.handleStockOut = async (e) => {
            e.preventDefault();
            const pid = document.getElementById('tx-prod-out').value;
            const qty = Number(document.getElementById('tx-qty-out').value);
            const prod = state.products.find(p => p.id === pid);
            if(prod) {
                if(prod.currentStock < qty) { showToast('Ralat', 'Baki stok semasa tidak mencukupi!', 'error'); return; }
                prod.currentStock -= qty;
                state.stockOut.push({ id: 'out_' + Date.now(), product: prod.name, qty, date: new Date().toLocaleDateString('ms-MY') });
                await saveToCloud();
                showToast('Stok Keluar', 'Kuantiti stok berjaya dikeluarkan.');
                navigate('dashboard');
            }
        };

        window.toggleNotif = () => { document.getElementById('notif-panel').classList.toggle('hidden'); };

        function renderApp() {
            const root = document.getElementById('app-root');
            if(!root) return;

            if (state.users.length === 0) {
                root.className = "flex h-full w-full items-center justify-center bg-slate-900 p-4";
                root.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full"><h2 class="text-xl font-bold mb-1">Mula Sistem Cloud AA STOCK</h2><p class="text-xs text-slate-400 mb-4">Sila cipta akaun pentadbir utama yang akan disimpan pada pelayan dalam talian.</p><form onsubmit="handleWizardSubmit(event)" class="space-y-4"><div><label class="block text-xs font-bold mb-1">Nama Penuh</label><input type="text" id="setup-name" required class="w-full border p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500"></div><div><label class="block text-xs font-bold mb-1">Nama Pengguna (Username)</label><input type="text" id="setup-username" required class="w-full border p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500"></div><div><label class="block text-xs font-bold mb-1">Kata Laluan (Password)</label><input type="password" id="setup-password" required class="w-full border p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500"></div><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold transition">Cipta & Aktifkan Sistem Cloud</button></form></div>`;
                return;
            }

            if (!state.currentUser) {
                root.className = "flex h-full w-full items-center justify-center bg-slate-900 p-4";
                root.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center"><h2 class="text-3xl font-black text-slate-900 tracking-tight">AA STOCK</h2><p class="text-xs text-blue-600 font-bold tracking-widest mt-1 mb-6 uppercase">Sistem Inventori Tim Online</p><form onsubmit="handleLogin(event)" class="space-y-4 text-left"><div><label class="block text-xs font-bold mb-1 text-slate-500">Username</label><input type="text" id="login-username" required class="w-full border p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500"></div><div><label class="block text-xs font-bold mb-1 text-slate-500">Password</label><input type="password" id="login-password" required class="w-full border p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-500"></div><button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold transition mt-2">Log Masuk</button></form></div>`;
                return;
            }

            const lowStockProducts = state.products.filter(p => p.currentStock <= p.minStock);

            root.className = "flex flex-col md:flex-row h-full w-full overflow-hidden";
            root.innerHTML = `
                <div class="w-full md:w-64 bg-slate-900 text-slate-100 flex flex-col shrink-0 no-print border-r border-slate-800">
                    <div class="p-6 border-b border-slate-800 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg text-lg">AA</div>
                        <div>
                            <h1 class="font-extrabold tracking-tight text-white text-base">AA STOCK</h1>
                            <p class="text-[10px] text-emerald-400 font-bold tracking-wider uppercase flex items-center gap-1"><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-ping"></span>Cloud Online</p>
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto px-4 py-6 space-y-1 no-scrollbar">
                        <button onclick="navigate('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="layout-dashboard" class="w-5 h-5"></i>Dashboard</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Katalog</div>
                        <button onclick="navigate('products')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'products' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="package" class="w-5 h-5"></i>Urus Produk</button>
                        <button onclick="navigate('categories')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'categories' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="tag" class="w-5 h-5"></i>Kategori</button>
                        <button onclick="navigate('suppliers')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'suppliers' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="truck" class="w-5 h-5"></i>Pembekal</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Transaksi</div>
                        <button onclick="navigate('stock-in')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'stock-in' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="arrow-down-left" class="w-5 h-5 text-emerald-400"></i>Stok Masuk</button>
                        <button onclick="navigate('stock-out')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'stock-out' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="arrow-up-right" class="w-5 h-5 text-rose-400"></i>Stok Keluar</button>
                        <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Arkib</div>
                        <button onclick="navigate('reports')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-left ${state.activeView === 'reports' ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800'}"><i data-lucide="file-bar-chart" class="w-5 h-5"></i>Laporan Baki</button>
                    </div>
                    <div class="p-4 border-t border-slate-800 bg-slate-950/40 flex items-center justify-between">
                        <div class="truncate">
                            <h4 class="text-xs font-semibold text-white">${state.currentUser.name}</h4>
                            <span class="text-[9px] font-bold bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded uppercase">${state.currentUser.role}</span>
                        </div>
                        <button onclick="logout()" class="p-2 text-slate-400 hover:text-rose-400 transition"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col min-w-0 overflow-y-auto">
                    <header class="bg-white border-b border-slate-200 h-16 px-6 flex items-center justify-between no-print sticky top-0 z-30 shrink-0">
                        <h2 class="font-bold text-slate-800 text-lg uppercase tracking-tight">${state.activeView.replace('-', ' ')}</h2>
                        <div class="relative">
                            <button onclick="toggleNotif()" class="p-2 hover:bg-slate-100 rounded-xl relative transition">
                                <i data-lucide="bell" class="w-5 h-5 text-slate-600"></i>
                                ${lowStockProducts.length > 0 ? `<span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>` : ''}
                            </button>
                            <div id="notif-panel" class="absolute right-0 top-12 w-80 bg-white border border-slate-200 rounded-2xl shadow-xl hidden z-50 p-4 max-h-60 overflow-y-auto">
                                <h3 class="font-bold text-xs text-slate-400 uppercase tracking-wider mb-2">Amaran Stok Rendah</h3>
                                ${lowStockProducts.length === 0 ? '<p class="text-xs text-slate-500">Semua baki stok berada pada paras selamat.</p>' : lowStockProducts.map(p => `
                                    <div class="p-2 bg-rose-50 border border-rose-100 rounded-lg text-xs mb-1">
                                        <strong>${p.name}</strong> kini hanya tinggal <span class="font-bold text-rose-600">${p.currentStock} ${p.unit}</span> (Min: ${p.minStock}).
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </header>
                    <main class="flex-1 p-6 md:p-8">${renderActiveView()}</main>
                </div>
            `;
            lucide.createIcons();
            initDashboardCharts();
        }

        function renderActiveView() {
            if(state.activeView === 'dashboard') {
                return `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white p-5 border border-slate-200 rounded-2xl shadow-sm"><span class="text-xs text-slate-400 font-bold block mb-1">SKU UNIK</span><span class="text-2xl font-black text-slate-900">${state.products.length}</span></div>
                        <div class="bg-white p-5 border border-slate-200 rounded-2xl shadow-sm"><span class="text-xs text-slate-400 font-bold block mb-1">JUMLAH STOK FIZIKAL</span><span class="text-2xl font-black text-blue-600">${state.products.reduce((a,b)=>a+Number(b.currentStock),0)} <span class="text-xs font-normal text-slate-500">Unit</span></span></div>
                        <div class="bg-white p-5 border border-slate-200 rounded-2xl shadow-sm"><span class="text-xs text-slate-400 font-bold block mb-1">KATEGORI</span><span class="text-2xl font-black text-slate-900">${state.categories.length}</span></div>
                        <div class="bg-white p-5 border border-slate-200 rounded-2xl shadow-sm"><span class="text-xs text-slate-400 font-bold block mb-1">PEMBEKAL BERDAFTAR</span><span class="text-2xl font-black text-slate-900">${state.suppliers.length}</span></div>
                    </div>
                    <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm mb-6">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Carta Ringkasan Stok Semasa</h3>
                        <div class="h-64"><canvas id="analyticsChart"></canvas></div>
                    </div>
                `;
            }
            if(state.activeView === 'products') {
                return `
                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                        <div class="xl:col-span-2 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-slate-50/50"><h3 class="font-bold text-slate-800">Senarai Katalog Produk</h3></div>
                            <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead><tr class="bg-slate-50 text-slate-400 font-bold border-b border-slate-100 text-xs uppercase"><th class="p-4">SKU</th><th class="p-4">Nama Produk</th><th class="p-4">Kategori</th><th class="p-4">Baki Semasa</th></tr></thead><tbody class="divide-y divide-slate-100">${state.products.length===0?'<tr><td colspan="4" class="p-8 text-center text-slate-400">Tiada produk yang tersimpan dalam cloud.</td></tr>':state.products.map(p=>`<tr class="hover:bg-slate-50/80"><td class="p-4 font-mono text-xs font-bold text-slate-600">${p.sku}</td><td class="p-4 font-semibold text-slate-900">${p.name}</td><td class="p-4 text-slate-500">${p.category || '-'}</td><td class="p-4 font-bold ${p.currentStock <= p.minStock ? 'text-rose-600' : 'text-blue-600'}">${p.currentStock} ${p.unit}</td></tr>`).join('')}</tbody></table></div>
                        </div>
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm h-fit">
                            <h3 class="font-bold text-slate-800 mb-4">Daftar / Kemaskini Produk</h3>
                            <form onsubmit="saveProduct(event)" class="space-y-4">
                                <input type="hidden" id="prod-form-id" value="">
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Kod SKU *</label><input type="text" id="prod-sku" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Nama Penuh Produk *</label><input type="text" id="prod-name" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Kategori</label><select id="prod-category" class="w-full border p-2.5 rounded-xl text-sm bg-white">${state.categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}</select></div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Pembekal Utama</label><select id="prod-supplier" class="w-full border p-2.5 rounded-xl text-sm bg-white">${state.suppliers.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}</select></div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div><label class="block text-xs font-bold mb-1 text-slate-500">Paras Amaran Min</label><input type="number" id="prod-min-stock" value="5" class="w-full border p-2.5 rounded-xl text-sm"></div>
                                    <div><label class="block text-xs font-bold mb-1 text-slate-500">Unit Ukuran (cth: Pcs)</label><input type="text" id="prod-unit" value="Pcs" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                </div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Kuantiti Stok Permulaan</label><input type="number" id="prod-current-stock" value="0" class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold transition text-sm">Simpan Ke Cloud Database</button>
                            </form>
                        </div>
                    </div>
                `;
            }
            if(state.activeView === 'categories') {
                return `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-4">Tambah Kategori Baru</h3>
                            <form onsubmit="saveCategory(event)" class="space-y-4">
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Nama Kategori</label><input type="text" id="cat-name" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-bold transition text-sm">Tambah</button>
                            </form>
                        </div>
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm">
                            <h3 class="font-bold text-slate-400 uppercase tracking-wider text-xs mb-3">Senarai Kategori</h3>
                            <ul class="divide-y divide-slate-100">${state.categories.length===0?'<li class="p-2 text-xs text-slate-400">Tiada kategori.</li>':state.categories.map(c=>`<li class="py-2.5 text-sm font-semibold text-slate-800 flex justify-between items-center"><span>${c.name}</span></li>`).join('')}</ul>
                        </div>
                    </div>
                `;
            }
            if(state.activeView === 'suppliers') {
                return `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-4">Pendaftaran Pembekal (Supplier)</h3>
                            <form onsubmit="saveSupplier(event)" class="space-y-4">
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Nama Syarikat / Pembekal</label><input type="text" id="sup-name" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">No. Telefon / Kontak</label><input type="text" id="sup-contact" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-bold transition text-sm">Simpan Pembekal</button>
                            </form>
                        </div>
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm">
                            <h3 class="font-bold text-slate-400 uppercase tracking-wider text-xs mb-3">Senarai Pembekal Berdaftar</h3>
                            <div class="space-y-2">${state.suppliers.length===0?'<p class="text-xs text-slate-400">Tiada pembekal.</p>':state.suppliers.map(s=>`<div class="p-3 bg-slate-50 rounded-xl text-sm"><p class="font-bold text-slate-900">${s.name}</p><p class="text-xs text-slate-500 mt-0.5">Hubungi: ${s.contact}</p></div>`).join('')}</div>
                        </div>
                    </div>
                `;
            }
            if(state.activeView === 'stock-in') {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm h-fit">
                            <h3 class="font-bold text-emerald-600 mb-4 flex items-center gap-2"><i data-lucide="arrow-down-left" class="w-5 h-5"></i>Kemasukan Stok Baru</h3>
                            <form onsubmit="handleStockIn(event)" class="space-y-4">
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Pilih Produk *</label><select id="tx-prod" required class="w-full border p-2.5 rounded-xl text-sm bg-white">${state.products.map(p=>`<option value="${p.id}">${p.name} (Baki: ${p.currentStock})</option>`).join('')}</select></div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Kuantiti Tambah *</label><input type="number" id="tx-qty" min="1" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-xl font-bold transition text-sm">Sahkan Stok Masuk</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-slate-50/50"><h3 class="font-bold text-xs text-slate-400 uppercase tracking-wider">Log Sejarah Stok Masuk (Cloud)</h3></div>
                            <div class="max-h-96 overflow-y-auto"><table class="w-full text-left text-sm"><thead><tr class="bg-slate-50 text-slate-400 font-bold border-b border-slate-100 text-xs"><th class="p-3">Tarikh</th><th class="p-3">Produk</th><th class="p-3 text-right">Kuantiti</th></tr></thead><tbody class="divide-y divide-slate-100">${state.stockIn.length===0?'<tr><td colspan="3" class="p-4 text-center text-slate-400 text-xs">Tiada rekod transaksi masuk.</td></tr>':state.stockIn.slice().reverse().map(log=>`<tr><td class="p-3 text-slate-500 text-xs">${log.date}</td><td class="p-3 font-semibold">${log.product}</td><td class="p-3 text-right font-bold text-emerald-600">+ ${log.qty}</td></tr>`).join('')}</tbody></table></div>
                        </div>
                    </div>
                `;
            }
            if(state.activeView === 'stock-out') {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 border border-slate-200 rounded-2xl shadow-sm h-fit">
                            <h3 class="font-bold text-rose-600 mb-4 flex items-center gap-2"><i data-lucide="arrow-up-right" class="w-5 h-5"></i>Pengeluaran Stok</h3>
                            <form onsubmit="handleStockOut(event)" class="space-y-4">
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Pilih Produk *</label><select id="tx-prod-out" required class="w-full border p-2.5 rounded-xl text-sm bg-white">${state.products.map(p=>`<option value="${p.id}">${p.name} (Baki: ${p.currentStock})</option>`).join('')}</select></div>
                                <div><label class="block text-xs font-bold mb-1 text-slate-500">Kuantiti Keluar *</label><input type="number" id="tx-qty-out" min="1" required class="w-full border p-2.5 rounded-xl text-sm"></div>
                                <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white p-3 rounded-xl font-bold transition text-sm">Sahkan Stok Keluar</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-slate-50/50"><h3 class="font-bold text-xs text-slate-400 uppercase tracking-wider">Log Sejarah Stok Keluar (Cloud)</h3></div>
                            <div class="max-h-96 overflow-y-auto"><table class="w-full text-left text-sm"><thead><tr class="bg-slate-50 text-slate-400 font-bold border-b border-slate-100 text-xs"><th class="p-3">Tarikh</th><th class="p-3">Produk</th><th class="p-3 text-right">Kuantiti</th></tr></thead><tbody class="divide-y divide-slate-100">${state.stockOut.length===0?'<tr><td colspan="3" class="p-4 text-center text-slate-400 text-xs">Tiada rekod transaksi keluar.</td></tr>':state.stockOut.slice().reverse().map(log=>`<tr><td class="p-3 text-slate-500 text-xs">${log.date}</td><td class="p-3 font-semibold">${log.product}</td><td class="p-3 text-right font-bold text-rose-600">- ${log.qty}</td></tr>`).join('')}</tbody></table></div>
                        </div>
                    </div>
                `;
            }
            if(state.activeView === 'reports') {
                return `
                    <div class="bg-white p-8 border border-slate-200 rounded-2xl shadow-md print-area">
                        <div class="flex justify-between items-start border-b pb-6 mb-6">
                            <div>
                                <h2 class="text-2xl font-black tracking-tight text-slate-900">AA STOCK</h2>
                                <p class="text-xs text-slate-500 font-medium">Laporan Rasmi Kedudukan Baki Stok Fizikal</p>
                            </div>
                            <button onclick="window.print()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs flex items-center gap-2 no-print transition"><i data-lucide="printer" class="w-4 h-4"></i> Cetak / Cetak PDF</button>
                        </div>
                        <p class="text-xs text-slate-400 mb-4 font-mono">Dijana pada: ${new Date().toLocaleString('ms-MY')}</p>
                        <table class="w-full text-left text-sm border-collapse">
                            <thead><tr class="bg-slate-100 border-b-2 border-slate-300 font-bold text-slate-700 text-xs uppercase"><th class="p-3">SKU</th><th class="p-3">Nama Item</th><th class="p-3">Kategori</th><th class="p-3">Pembekal</th><th class="p-3 text-right">Baki Semasa</th></tr></thead>
                            <tbody class="divide-y divide-slate-200">${state.products.length===0?'<tr><td colspan="5" class="p-4 text-center text-slate-400">Tiada rekod stok untuk dijana.</td></tr>':state.products.map(p=>`<tr><td class="p-3 font-mono text-xs">${p.sku}</td><td class="p-3 font-bold">${p.name}</td><td class="p-3">${p.category || '-'}</td><td class="p-3 text-slate-500">${p.supplier || '-'}</td><td class="p-3 text-right font-bold text-blue-600">${p.currentStock} ${p.unit}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                `;
            }
        }

        function initDashboardCharts() {
            const ctx = document.getElementById('analyticsChart');
            if (!ctx) return;
            if (myChart) { myChart.destroy(); }
            const labels = state.products.map(p => p.name);
            const data = state.products.map(p => p.currentStock);
            myChart = new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Kuantiti Baki Semasa',
                        data: data,
                        backgroundColor: 'rgba(59, 130, 246, 0.65)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
